exhaust_test: false


# ModelParams
scene_type: "DriveXWaymo"
resolution_scales: [1, 2, 4, 8, 16]
cam_num: 3
eval: true
testhold: 2  # NVS
num_pts: 600000
t_init: 0.1

# start_time: 61
# end_time: 109
start_time: 0
end_time: 100


order: 3 # new, 3 for cubic bezier
bbox_frame_interval: 6 # 3 frames for bbox

load_sky_mask: true
load_dynamic_mask: true
load_bbox_mask: true

# PipelineParams

# OptimizationParams
iterations: 30000

opacity_lr: 0.005

# densify_from_iter: 500
densify_until_iter: 15000
densify_grad_threshold: 0.00017
sh_increase_interval: 2000


prune_interval: 200

render_type: bezier

static_thresh: 1.0

thresh_opa_prune: 0.005
opa_init: 0.01

position_lr_init: 1.6e-5
position_lr_final: 1.6e-7
